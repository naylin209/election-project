<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Forgot password – American Dream Election</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="auth-page">
      <section class="auth-card">
        <h1 class="auth-title">Forgot password</h1>
        <p class="auth-subtitle">
          Enter your email address and we’ll send a reset link if an account exists.
        </p>

        <form id="forgot-form" class="auth-form" novalidate>
          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              autocomplete="email"
              required
            />
          </div>

          <button type="submit" class="btn-primary">Send reset link</button>

          <p id="forgot-message" class="form-error" aria-live="polite"></p>
        </form>

        <p style="margin-top: 12px; font-size: 13px;">
          <a href="./login.html" class="link-small">Back to sign in</a>
        </p>
      </section>
    </main>

    <script type="module">
      const API_BASE_URL = 'http://localhost:3000/api';
      const form = document.getElementById('forgot-form');
      const emailInput = document.getElementById('email');
      const msgEl = document.getElementById('forgot-message');

      function setMessage(text) {
        msgEl.textContent = text || '';
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        setMessage('');

        const email = emailInput.value.trim();
        if (!email) {
          setMessage('Email is required.');
          return;
        }

        try {
          await fetch(`${API_BASE_URL}/auth/forgot-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email }),
          });
          setMessage('If that email exists, a reset link has been sent.');
        } catch (err) {
          console.error(err);
          setMessage('Unable to send reset email right now.');
        }
      });
    </script>
  </body>
  </html>
