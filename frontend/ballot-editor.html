<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ballot Editor - American Dream Election</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-gray-50">

    <!-- Navbar -->
    <header class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-10">
      <div class="max-w-4xl mx-auto px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <img src="./applogo.png" alt="American Dream Election logo" class="h-10 w-auto" />
          <h1 id="page-title" class="text-lg font-bold text-gray-800">Ballot Editor</h1>
        </div>
        <a href="./dashboard.html"
          class="bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium px-4 py-2 rounded-lg transition">
          ← Back
        </a>
      </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 py-8 space-y-8">

      <!-- Election Details -->
      <section class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 space-y-4">
        <h2 class="text-base font-semibold text-gray-700 uppercase tracking-wide text-sm">Election Details</h2>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="sm:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Election Name *</label>
            <input id="election-name" type="text" placeholder="e.g. IEEE 2026 Officer Election"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>

          <div id="society-wrapper">
            <label class="block text-sm font-medium text-gray-700 mb-1">Society *</label>
            <select id="society-select"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-500">
              <option value="">Loading societies...</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Start Date *</label>
            <input id="start-date" type="date"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">End Date *</label>
            <input id="end-date" type="date"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>

          <div class="sm:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
            <textarea id="description" rows="2" placeholder="Optional description for this election"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
          </div>
        </div>

        <div id="create-election-btn-wrapper">
          <button id="create-election-btn"
            class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-2.5 rounded-lg transition">
            Create Election & Edit Ballot →
          </button>
        </div>
      </section>

      <!-- Ballot Editor (shown after election created/loaded) -->
      <div id="ballot-section" class="space-y-8 hidden">

        <p id="election-status-banner" class="text-sm font-medium text-amber-700 bg-amber-50 border border-amber-200 rounded-lg px-4 py-3 hidden"></p>

        <!-- Offices -->
        <section class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 space-y-4">
          <div class="flex items-center justify-between">
            <h2 class="text-base font-semibold text-gray-700 uppercase tracking-wide text-sm">Offices</h2>
            <button id="add-office-btn"
              class="text-sm bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-medium px-4 py-2 rounded-lg transition">
              + Add Office
            </button>
          </div>
          <div id="offices-list" class="space-y-4"></div>
        </section>

        <!-- Initiatives -->
        <section class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 space-y-4">
          <div class="flex items-center justify-between">
            <h2 class="text-base font-semibold text-gray-700 uppercase tracking-wide text-sm">Ballot Initiatives</h2>
            <button id="add-initiative-btn"
              class="text-sm bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-medium px-4 py-2 rounded-lg transition">
              + Add Initiative
            </button>
          </div>
          <div id="initiatives-list" class="space-y-4"></div>
        </section>

        <!-- Action Buttons -->
        <div class="flex gap-3 flex-wrap">
          <button id="save-btn"
            class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-2.5 rounded-lg transition">
            Save Ballot
          </button>
          <button id="publish-btn"
            class="bg-green-600 hover:bg-green-700 text-white font-semibold px-6 py-2.5 rounded-lg transition">
            Publish Election
          </button>
        </div>

        <p id="action-message" class="text-sm font-medium text-center min-h-[20px]"></p>
      </div>

    </main>

    <script src="./ballot-editor.js" type="module"></script>
  </body>
</html>
