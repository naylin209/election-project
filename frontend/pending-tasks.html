<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pending Tasks - American Dream Election</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="min-h-screen bg-gray-50 flex flex-col">

    <header id="app-navbar" class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-10"></header>

    <main class="max-w-3xl mx-auto px-4 sm:px-6 py-8 flex-1 w-full">
      <div class="mb-6">
        <h1 class="text-2xl font-bold text-gray-900">Pending Tasks</h1>
        <p class="text-sm text-gray-500 mt-1">Draft elections in your assigned societies that need a ballot.</p>
      </div>
      <div id="tasks-list" class="space-y-4"></div>
    </main>

    <footer id="app-footer" class="border-t border-gray-200 bg-white mt-auto"></footer>

    <script src="./pending-tasks.js" type="module"></script>
  </body>
</html>
