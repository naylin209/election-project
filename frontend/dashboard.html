<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard - American Dream Election</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="min-h-screen bg-gray-50 flex flex-col">

    <!-- Shared Navbar -->
    <header id="app-navbar" class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-10"></header>

    <!-- Content -->
    <main class="max-w-6xl mx-auto px-4 sm:px-6 py-8 flex-1 w-full">

      <!-- Role-specific quick-actions panel (filled by JS) -->
      <div id="role-panel" class="hidden mb-6"></div>

      <!-- Elections section -->
      <div class="mb-6 flex items-center justify-between gap-4">
        <div>
          <h2 class="text-2xl font-bold text-gray-800">Your Elections</h2>
          <p class="text-gray-500 mt-1">Choose an election to vote or view results.</p>
        </div>
        <a id="create-election-btn" href="./ballot-editor.html"
          class="hidden bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-5 py-2.5 rounded-lg transition whitespace-nowrap">
          + Create Election
        </a>
      </div>
      <div id="elections-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
    </main>

    <!-- Shared Footer -->
    <footer id="app-footer" class="border-t border-gray-200 bg-white mt-auto"></footer>

    <script src="./dashboard.js" type="module"></script>
  </body>
</html>
