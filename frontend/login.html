<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>American Dream Election – Sign in</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-blue-50 flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-lg w-full max-w-md p-8 border border-gray-100">

      <div class="flex flex-col items-center mb-8">
        <img src="./applogo.png" alt="American Dream Election logo" class="h-20 w-auto mb-4 drop-shadow-sm" />
        <h1 class="text-2xl font-bold text-gray-800">Sign in</h1>
        <p class="text-gray-400 text-sm mt-1">American Dream Election System</p>
      </div>

      <form id="login-form" novalidate class="space-y-5">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
          <input type="email" id="email" name="email" autocomplete="email" required
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-gray-800 placeholder-gray-400
                   focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-gray-800 placeholder-gray-400
                   focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
        </div>

        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer select-none">
            <input type="checkbox" id="rememberMe"
              class="w-4 h-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500" />
            <span>Remember me</span>
          </label>
          <a href="./forgot-password.html"
            class="text-sm text-indigo-600 hover:text-indigo-800 font-medium transition">
            Forgot password?
          </a>
        </div>

        <button type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-semibold
                 py-2.5 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed">
          Sign in
        </button>

        <p id="error-message" class="text-red-500 text-sm text-center min-h-[20px]" aria-live="polite"></p>
      </form>
    </div>

    <script src="./login.js" type="module"></script>
  </body>
</html>
